<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root{
    --paper:#F5ECD9;
    --paper-dark:#EADFC5;
    --ink:#2B2118;
    --teal:#1F6F6B;
    --teal-dark:#164F4C;
    --sunset:#E8703A;
    --gold:#D9A441;
    --forest:#355E3B;
    --stamp-ring:#c94f2b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 10% 10%, rgba(217,164,65,0.15), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(31,111,107,0.15), transparent 40%),
      var(--paper);
    color:var(--ink);
    font-family:'Quicksand', sans-serif;
    min-height:100vh;
  }

  /* ---------- Cover / header ---------- */
  header{
    padding:22px 20px 16px;
    text-align:center;
    position:relative;
  }
  header .plane{
    font-size:2.2rem;
    display:inline-block;
    transform:rotate(-8deg);
  }
  h1{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:1.7rem;
    margin:4px 0 2px;
    color:var(--teal-dark);
    letter-spacing:0.5px;
  }
  header .sub{
    font-family:'Space Mono', monospace;
    font-size:0.75rem;
    color:var(--ink);
    opacity:0.65;
    letter-spacing:1px;
    text-transform:uppercase;
  }

  #progress-wrap{
    max-width:420px;
    margin:14px auto 0;
    padding:0 20px;
  }
  #progress-label{
    font-family:'Fredoka', sans-serif;
    font-size:0.95rem;
    font-weight:600;
    color:var(--sunset);
    margin-bottom:6px;
    text-align:center;
  }
  #progress-track{
    height:14px;
    background:var(--paper-dark);
    border-radius:8px;
    border:2px solid var(--ink);
    overflow:hidden;
  }
  #progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--gold), var(--sunset));
    width:0%;
    transition:width 0.5s ease;
  }

  /* ---------- Real colored topographic map (Leaflet + OpenTopoMap) ---------- */
  #map-wrap{
    max-width:460px;
    margin:22px auto 30px;
    padding:0 16px;
  }
  #map-frame{
    position:relative;
    width:100%;
    aspect-ratio:5 / 8;
    border-radius:18px;
    border:3px solid var(--ink);
    overflow:hidden;
    box-shadow:0 8px 0 rgba(0,0,0,0.18);
  }
  #leaflet-map{ position:absolute; inset:0; }
  .map-legend{
    text-align:center;
    font-family:'Space Mono', monospace;
    font-size:0.68rem;
    opacity:0.6;
    margin-top:8px;
  }

  /* markers (Leaflet divIcon content) */
  .map-marker{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    background:none;
    border:none;
    cursor:pointer;
  }
  .map-marker .icon-badge{
    width:50px;height:50px;
    border-radius:50%;
    background:rgba(245,236,217,0.95);
    border:3px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    font-size:1.6rem;
    box-shadow:0 3px 0 rgba(0,0,0,0.22);
    position:relative;
    overflow:hidden;
  }
  .map-marker .icon-badge .icon-photo-wrap{
    display:block; width:100%; height:100%;
    border-radius:50%; overflow:hidden;
  }
  .map-marker .icon-badge .icon-photo{
    width:100%; height:100%;
    object-fit:cover;
    border-radius:50%;
    display:block;
  }
  .map-marker.activity .icon-badge{ border-style:dashed; width:42px;height:42px; font-size:1.3rem; }
  .map-marker:active .icon-badge{ transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,0.22); }
  .map-marker .icon-label{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:0.6rem;
    color:var(--ink);
    background:rgba(245,236,217,0.9);
    padding:1px 6px;
    border-radius:6px;
    white-space:nowrap;
    max-width:100px;
    overflow:hidden;
    text-overflow:ellipsis;
    box-shadow:0 1px 2px rgba(0,0,0,0.15);
  }
  .map-marker.collected .icon-badge{
    background:var(--gold);
    border-color:var(--stamp-ring);
  }
  .map-marker.collected .icon-badge::after{
    content:"✓";
    position:absolute;
    bottom:-4px; right:-4px;
    width:18px; height:18px;
    background:var(--forest);
    color:#fff;
    border-radius:50%;
    font-size:0.65rem;
    display:flex;align-items:center;justify-content:center;
    border:2px solid var(--paper);
  }

  /* per-icon idle animations, applied to the emoji span itself */
  .icon-anim{ display:inline-block; }
  .anim-bob .icon-anim{ animation:bob 2.6s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-4px); } }

  .anim-sway .icon-anim{ animation:sway 3s ease-in-out infinite; transform-origin:50% 90%; }
  @keyframes sway{ 0%,100%{ transform:rotate(-6deg); } 50%{ transform:rotate(6deg); } }

  .anim-drive .icon-anim{ animation:drive 3.2s ease-in-out infinite; }
  @keyframes drive{ 0%,100%{ transform:translateX(-3px); } 50%{ transform:translateX(3px); } }

  .anim-scuttle .icon-anim{ animation:scuttle 2.4s ease-in-out infinite; }
  @keyframes scuttle{ 0%,100%{ transform:translateX(-3px) rotate(-4deg); } 50%{ transform:translateX(3px) rotate(4deg); } }

  .anim-zip .icon-anim{ animation:zip-slide 1.8s ease-in-out infinite; }
  @keyframes zip-slide{ 0%,100%{ transform:translate(-7px,4px) rotate(-18deg); } 50%{ transform:translate(7px,-4px) rotate(-18deg); } }

  .anim-sparkle .icon-anim{ animation:sparkle 2.2s ease-in-out infinite; }
  @keyframes sparkle{ 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.7; transform:scale(1.12); } }

  .anim-flag .icon-anim{ animation:flag-wave 1.6s ease-in-out infinite; transform-origin:0% 50%; }
  @keyframes flag-wave{ 0%,100%{ transform:skewY(-6deg); } 50%{ transform:skewY(6deg); } }

  .anim-ripple .icon-anim{ animation:ripple 2.8s ease-in-out infinite; }
  @keyframes ripple{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.08); } }

  /* ---------- Postcard modal ---------- */
  #overlay{
    position:fixed; inset:0;
    background:rgba(43,33,24,0.55);
    display:none;
    align-items:center; justify-content:center;
    padding:20px;
    z-index:5000;
  }
  #overlay.open{ display:flex; }
  .card-scene{
    perspective:1400px;
    width:100%;
    max-width:360px;
  }
  .postcard{
    position:relative;
    width:100%;
    min-height:480px;
    transform-style:preserve-3d;
    transition:transform 0.6s cubic-bezier(.4,.2,.2,1);
  }
  .postcard.flipped{ transform:rotateY(180deg); }
  .face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    background:var(--paper);
    border-radius:14px;
    border:3px solid var(--ink);
    box-shadow:0 10px 0 rgba(0,0,0,0.2);
    padding:20px;
    overflow:hidden;
  }
  .face.back{ transform:rotateY(180deg); }

  .close-x{
    position:absolute; top:10px; right:10px;
    width:32px;height:32px;
    border-radius:50%;
    background:var(--ink);
    color:var(--paper);
    border:none;
    font-size:1rem;
    cursor:pointer;
    z-index:2;
  }

  .illustration{
    height:150px;
    border-radius:10px;
    border:2px solid var(--ink);
    margin-bottom:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:3.5rem;
    position:relative;
    overflow:hidden;
  }
  .place-name{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:1.3rem;
    color:var(--teal-dark);
    margin:0 0 2px;
  }
  .place-date{
    font-family:'Space Mono', monospace;
    font-size:0.72rem;
    color:var(--sunset);
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-bottom:10px;
    display:block;
  }
  .fun-list{
    list-style:none;
    margin:0; padding:0;
    font-size:0.92rem;
    line-height:1.5;
  }
  .fun-list li{
    margin-bottom:7px;
    padding-left:26px;
    position:relative;
  }
  .fun-list li::before{
    content:attr(data-emoji);
    position:absolute; left:0; top:0;
  }
  .flip-btn{
    margin-top:14px;
    width:100%;
    padding:11px;
    border-radius:9px;
    border:2px solid var(--ink);
    background:var(--teal);
    color:#fff;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:0.95rem;
    cursor:pointer;
  }
  .flip-btn:active{ background:var(--teal-dark); }
  .flip-btn.collect{ background:var(--sunset); }

  .stamp-mark{
    position:absolute;
    top:14px; right:14px;
    width:64px; height:64px;
    border:3px solid var(--stamp-ring);
    border-radius:50%;
    color:var(--stamp-ring);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:0.65rem;
    text-align:center;
    transform:rotate(12deg);
    opacity:0;
    transition:opacity 0.3s ease;
    text-transform:uppercase;
    line-height:1.1;
  }
  .stamp-mark.show{ opacity:0.85; }

  .back h2{
    font-family:'Fredoka', sans-serif;
    text-align:center;
    color:var(--forest);
    margin-top:40px;
  }
  .back p{
    text-align:center;
    font-size:0.95rem;
  }

  footer{
    text-align:center;
    font-family:'Space Mono', monospace;
    font-size:0.7rem;
    opacity:0.55;
    padding:10px 20px 30px;
  }
</style>
</head>

const collected = new Set();

// --- Per-kid personalization & persistent progress ---
// Each kid gets their own link like ?name=Emma. Progress saves two
// independent ways so it survives even if one is blocked/restricted:
//   1) localStorage, keyed per name
//   2) the page's own URL (?got=stamp1,stamp2,...), updated silently via
//      history.replaceState -- this works even in browser contexts that
//      block or partition localStorage (some iOS in-app/private browsers do)
const urlParams = new URLSearchParams(window.location.search);
let kidName = urlParams.get('name');
let storageOk = true;
try {
  kidName = kidName || localStorage.getItem('tripPassportKidName');
} catch (e) { storageOk = false; }
if (!kidName) {
  kidName = (prompt("What's your name?") || 'Explorer').trim();
}
try { localStorage.setItem('tripPassportKidName', kidName); } catch (e) { storageOk = false; }
const storageKey = 'tripPassportCollected_' + kidName.toLowerCase();

// Load previously-collected stamps from BOTH sources and merge them --
// whichever one actually worked on this device restores the progress.
const gotFromUrl = (urlParams.get('got') || '').split(',').filter(Boolean);
gotFromUrl.forEach(id => collected.add(id));
try {
  const saved = JSON.parse(localStorage.getItem(storageKey) || '[]');
  saved.forEach(id => collected.add(id));
} catch (e) { storageOk = false; }

function saveProgress(){
  // 1) localStorage (may silently fail in restricted browser contexts)
  try { localStorage.setItem(storageKey, JSON.stringify([...collected])); }
  catch (e) { storageOk = false; }

  // 2) URL itself, so a plain refresh/reopen of this exact tab restores
  // progress even when localStorage isn't available at all
  const newParams = new URLSearchParams(window.location.search);
  newParams.set('name', kidName);
  newParams.set('got', [...collected].join(','));
  const newUrl = window.location.pathname + '?' + newParams.toString();
  history.replaceState(null, '', newUrl);
}
// Make sure the very first collected stamp (or the merge above) is
// reflected in the URL right away, not just after the next collect click.
saveProgress();

if (!storageOk) {
  console.warn('This browser is blocking or restricting localStorage. Progress will still be saved in the page URL -- avoid re-typing a plain link without the "got=" part, and bookmark the current address instead if that matters.');
}

// Show whose passport this is, right under the title
document.querySelector('header .sub').textContent = `${kidName}'s passport — tap a stamp to see what's there`;

// Guard against a classic Leaflet bug: if the container is measured before the
// page has finished laying out (aspect-ratio CSS not yet resolved), Leaflet can
// initialize against a 0-height box and render nothing. Force an explicit
// pixel height up front from the container's actual current width.
const mapFrameEl = document.getElementById('map-frame');
const leafletDiv = document.getElementById('leaflet-map');
function ensureMapFrameSized(){
  const w = mapFrameEl.clientWidth || mapFrameEl.getBoundingClientRect().width;
  if (w > 0) {
    mapFrameEl.style.height = (w * 8 / 5) + 'px';
  }
}
ensureMapFrameSized();

const map = L.map('leaflet-map', { zoomControl: true, scrollWheelZoom: true });

// Primary: OpenTopoMap (colored contour/relief, CC-BY-SA, built for embedding).
// Fallback: standard OpenStreetMap tiles, in case OpenTopoMap's servers are
// unreachable or rate-limiting -- so the map is never left blank.
const primaryTiles = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  subdomains: 'abc',
  maxZoom: 17,
  attribution: 'Map: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (CC-BY-SA), data &copy; OpenStreetMap contributors, SRTM'
});

let tileErrorCount = 0;
let fallbackActive = false;
primaryTiles.on('tileerror', () => {
  tileErrorCount++;
  if (tileErrorCount > 6 && !fallbackActive) {
    fallbackActive = true;
    map.removeLayer(primaryTiles);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      subdomains: 'abc',
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
  }
});
primaryTiles.addTo(map);

const bounds = L.latLngBounds(stops.map(s => [s.lat, s.lng]));
map.fitBounds(bounds, { padding: [30, 30] });

// Re-measure after layout settles and after any window resize -- Leaflet tiles
// can render blank/mispositioned if the container size changes after init
// without this call.
function resync(){
  ensureMapFrameSized();
  map.invalidateSize();
}
// Multiple staggered passes: catches whichever async thing (web fonts, images,
// tile layer's own first paint) finishes last and reflows the page after
// Leaflet already measured its container.
[50, 200, 500, 1000, 2000].forEach(ms => setTimeout(resync, ms));
window.addEventListener('load', resync);
window.addEventListener('resize', resync);

// Web fonts (Fredoka/Quicksand) load asynchronously and can swap in *after*
// Leaflet has already measured the page, shifting layout just enough to
// desync the map until the user zooms. Force a resync the moment fonts
// actually finish loading, which is the most likely real cause of the
// "blank until you zoom" symptom.
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(resync);
}

// Dashed route connecting every stop in order, using real lat/lng --
// Leaflet handles the projection, so this is always geographically correct.
// The trip is a loop (out from Yorba Linda, back to Yorba Linda), so the
// line closes by returning to the first stop's coordinates at the end.
const routeControlPoints = stops.map(s => [s.lat, s.lng]);
routeControlPoints.push([stops[0].lat, stops[0].lng]);

// Catmull-Rom spline: generates a smooth, curvy line that still passes
// exactly through every real stop coordinate (not an approximation).
function catmullRomSpline(points, segmentsPerSpan = 16){
  const out = [];
  const n = points.length;
  for (let i = 0; i < n - 1; i++){
    const p0 = points[i === 0 ? 0 : i - 1];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[i + 2 < n ? i + 2 : i + 1];
    for (let t = 0; t < segmentsPerSpan; t++){
      const s = t / segmentsPerSpan;
      const s2 = s * s, s3 = s2 * s;
      const lat = 0.5 * ((2 * p1[0]) + (-p0[0] + p2[0]) * s +
                  (2*p0[0] - 5*p1[0] + 4*p2[0] - p3[0]) * s2 +
                  (-p0[0] + 3*p1[0] - 3*p2[0] + p3[0]) * s3);
      const lng = 0.5 * ((2 * p1[1]) + (-p0[1] + p2[1]) * s +
                  (2*p0[1] - 5*p1[1] + 4*p2[1] - p3[1]) * s2 +
                  (-p0[1] + 3*p1[1] - 3*p2[1] + p3[1]) * s3);
      out.push([lat, lng]);
    }
  }
  out.push(points[n - 1]);
  return out;
}

const routePoints = catmullRomSpline(routeControlPoints);
L.polyline(routePoints, {
  color: '#2B2118', weight: 2, dashArray: '5,6', opacity: 0.6, smoothFactor: 1
}).addTo(map);

const markers = [];
stops.forEach((s, i) => {
  const icon = L.divIcon({
    className: '',
    html: `
      <div class="map-marker ${s.anim} ${s.type === 'activity' ? 'activity' : ''} ${collected.has(s.id) ? 'collected' : ''}" data-idx="${i}" aria-label="${s.name}">
        <div class="icon-badge">${s.mapImg ? `<span class="icon-anim icon-photo-wrap"><img src="${s.mapImg}" alt="${s.name}" class="icon-photo" style="transform: scale(${s.mapImgScale || 1});"></span>` : `<span class="icon-anim">${s.mapIcon}</span>`}</div>
        <div class="icon-label">${s.mapLabel}</div>
      </div>
    `,
    iconSize: null,
    iconAnchor: [25, 45]
  });
  const m = L.marker([s.lat, s.lng], { icon }).addTo(map);
  m.on('click', () => openStop(i));
  markers.push(m);
});

// --- "You are here" RV marker: real GPS when available, otherwise the
// stop matching today's actual date, positioned just beside that stop's icon. ---
function getTodaysStopIndex(){
  const today = new Date();
  today.setHours(0,0,0,0);
  let idx = 0; // default: before the trip starts, show at the first stop
  for (let i = 0; i < stops.length; i++){
    const start = new Date(stops[i].startDate + 'T00:00:00');
    const end = new Date(stops[i].endDate + 'T00:00:00');
    if (today >= start && today <= end){
      idx = i; // keep matching forward so overlapping arrival days pick the later stop
    }
    if (today > end){
      idx = Math.min(i + 1, stops.length - 1); // after this stop's window, default forward
    }
  }
  return idx;
}

function placeYouAreHereMarker(lat, lng){
  // Half the previous size (was 34px tall), aspect ratio preserved automatically
  const rvH = 17;
  const rvW = Math.round(rvH * 1.4925); // RV image's real width:height ratio
  const rvImgSmall = rvIconImg.replace('height:100px;', `height:${rvH}px;`);

  const icon = L.divIcon({
    className: '',
    html: `<div style="pointer-events:none; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.35));">${rvImgSmall}</div>`,
    iconSize: null,
    // A stop's own icon is anchored [25,45] with its circular badge starting
    // at the very top of its box -- so the badge's top edge sits exactly
    // 45px above the shared lat/lng point, regardless of badge size. Anchoring
    // the RV image's own bottom edge at (rvH + 45) puts it flush against
    // that same edge: touching, never overlapping, no separate offset needed.
    iconAnchor: [Math.round(rvW / 2), rvH + 45]
  });
  L.marker([lat, lng], { icon, zIndexOffset: 1000, interactive: false }).addTo(map);
}

function placeYouAreHereFallback(){
  const idx = getTodaysStopIndex();
  const s = stops[idx];
  // Same exact coordinates as the stop -- the pixel-anchor math above (not a
  // geographic offset) is what keeps it sitting just above that icon without
  // covering it, correctly at any zoom level.
  placeYouAreHereMarker(s.lat, s.lng);
}

if (navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    (pos) => placeYouAreHereMarker(pos.coords.latitude, pos.coords.longitude),
    () => placeYouAreHereFallback(),
    { timeout: 6000, maximumAge: 300000 }
  );
} else {
  placeYouAreHereFallback();
}

function updateProgress(){
  document.getElementById('progress-label').textContent = `${collected.size} of ${stops.length} stamps collected`;
  document.getElementById('progress-fill').style.width = (collected.size / stops.length * 100) + '%';
}

const overlay = document.getElementById('overlay');
const postcard = document.getElementById('postcard');
let currentIdx = null;

function openStop(i){
  currentIdx = i;
  const s = stops[i];
  postcard.classList.remove('flipped');

  document.getElementById('front-illustration').style.background = s.bg;
  document.getElementById('front-illustration').innerHTML = s.illo;
  document.getElementById('front-name').textContent = s.name;
  document.getElementById('front-date').textContent = s.date;

  const list = document.getElementById('front-list');
  list.innerHTML = '';
  s.fun.forEach(f => {
    const li = document.createElement('li');
    li.dataset.emoji = f.e;
    li.textContent = f.t;
    list.appendChild(li);
  });

  document.getElementById('back-title').textContent = s.backTitle;
  document.getElementById('back-illustration').style.background = s.bg;
  document.getElementById('back-illustration').textContent = s.backIllo;
  document.getElementById('back-fact').textContent = s.backFact;

  const stampMark = document.getElementById('stamp-mark');
  stampMark.classList.toggle('show', collected.has(s.id));

  const collectBtn = document.getElementById('collect-btn');
  collectBtn.textContent = collected.has(s.id) ? '✅ Stamp collected!' : '📮 Collect this stamp!';

  overlay.classList.add('open');
}

function closeOverlay(){
  overlay.classList.remove('open');
}

document.querySelectorAll('.close-x').forEach(b => b.addEventListener('click', closeOverlay));
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeOverlay(); });

document.getElementById('flip-to-back').addEventListener('click', () => {
  postcard.classList.add('flipped');
});
document.getElementById('back-title').parentElement; // no-op, keep back face static otherwise

// allow tapping the back face to flip back to front
document.querySelector('.face.back').addEventListener('click', (e) => {
  if (e.target.id === 'collect-btn' || e.target.classList.contains('close-x')) return;
  postcard.classList.remove('flipped');
});

document.getElementById('collect-btn').addEventListener('click', () => {
  const s = stops[currentIdx];
  collected.add(s.id);
  saveProgress();
  document.getElementById('stamp-mark').classList.add('show');
  document.getElementById('collect-btn').textContent = '✅ Stamp collected!';
  document.querySelector(`.map-marker[data-idx="${currentIdx}"]`).classList.add('collected');
  updateProgress();
});

updateProgress();
</script>
</body>
</html>
